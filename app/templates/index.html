<!DOCTYPE html>
<html>
<head>
<title>Weather DevOps</title>
</head>

<body>

<h1>Weather DevOps App</h1>

<form method="POST">
<input name="city" placeholder="Paris">
<button type="submit">Search</button>
</form>

{% if weather %}
<h2>{{ weather.city }}</h2>
<p>Temperature: {{ weather.temp }} °C</p>
<p>{{ weather.description }}</p>
{% endif %}

</body>
</html>
